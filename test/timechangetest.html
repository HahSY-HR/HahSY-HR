<!DOCTYPE html>
<html>
  <head>
    <title>현재시간</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0">
      <script language="javascript">
        var inittime = Date.now(); //최초로 문서를 열어본 시각
        function time(){
          var time= new Date(); //시간받기위해서 new date
          var diff = Math.round((time-inittime)/1000);
          document.getElementById("sub").innerHTML=diff;
          if(diff > 10){
            document.getElementById("now").innerHTML="보고있어";
          }
          else{
            document.getElementById("now").innerHTML=time.getSeconds()+"초";
          }
         setInterval("time()",1000);     //1초 지난후 time()실행
        }
    </script>
  </head>
  <body onload="time()">
    <h2> 현재 시간: <span id="now"></span></h2>
    <h2> 시간차: <span id="sub"></span></h2>
  </body>
</html>
